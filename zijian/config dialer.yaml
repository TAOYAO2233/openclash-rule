# 机场订阅，名称不能重复
proxy-providers:
  Airport1: # 机场名称可以更改
    url: ""
    type: http  # 【获取方式】指定通过 HTTP(S) 协议拉取配置
    interval: 86400 # 更新间隔单位秒
    health-check:
      enable: true  # 是否启用自动心跳检测
      url: https://www.gstatic.com/generate_204
      interval: 120 # 每隔***秒执行一次检测
      tolerance: 50 # 【容差】单位为毫秒。只有当新测得延迟与原延迟差值超过此值时，才更新节点状态
      timeout: 5000 # 超时时间，超过 5 秒未响应则判定为节点失效
      max-failed-times: 5  # 最大失败次数，超过此次数则判定为节点失效
    proxy: 直连 # 更新选用的节点
    header:
      User-Agent: # 自定义 UA 标识，部分机场后端会根据 UA 返回不同格式（如 Clash/Mihomo 专用格式）
        - "clash"
        - "mihomo"
        - "clash.meta"
    override:  #额外设置
      udp: true # 强制开启所有节点的 UDP 支持（适用于游戏或语音通话）
      #xudp: false
      down: "800 Mbps"   # 模拟设置节点的下行带宽限制（仅作元数据展示或流控参考）
      up: "50 Mbps" # 模拟设置节点的上行带宽限制
      skip-cert-verify: true  # 【安全性跳过】忽略 TLS 证书验证，防止因证书过期或 SNI 阻断导致无法连接（生产环境需谨慎）

  provider1:
    type: inline  # 【类型：内联】不同于 http 远程拉取，此处节点信息直接写在配置文件中
    override:
      dialer-proxy: 🛫 前置节点 # 【链式代理/隧道】此设置最为关键。
    # 它意味着：在连接下面 payload 中的任何节点时，流量都会先经过“🛫 前置节点”。
    # 物理路径：客户端 -> 🛫 前置节点 -> payload 里的落地节点 -> 目标网站。
    # 这通常用于“中转”或“隧道”架构，保护落地 IP 或优化跨境链路。
    payload:
      - { name: "", type: "ss", server: "", port: 26363, cipher: "", password: "" }


